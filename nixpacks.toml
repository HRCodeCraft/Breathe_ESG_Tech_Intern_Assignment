[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "python3 -m pip install -r backend/requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && VITE_API_URL=/api npm run build",
  "cp -r frontend/dist backend/frontend_build",
  "cd backend && python3 manage.py collectstatic --noinput --settings=breathe_esg.settings.prod"
]

[start]
cmd = "cd backend && python3 -m gunicorn breathe_esg.wsgi --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
